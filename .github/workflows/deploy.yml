name: Deploy MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-southeast-1
  PULUMI_STACK: faizulkhan/mlops-pipeline/sandbox
  DOCKERHUB_USERNAME: faizul56

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ml-inference, data-ingestion]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies and run tests
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest

          if [ -d "tests" ]; then
            echo "Tests directory found, running pytest..."
            python -m pytest tests/ -v --tb=short
          else
            echo "Tests directory not found, running basic health test..."
            python - <<EOF
            import sys
            sys.path.insert(0, '.')

            try:
                from app import app
                print('App import successful')
                client = app.test_client()
                response = client.get('/health')
                print(f'Health check: {response.status_code}')
                assert response.status_code == 200
                print('Basic health test passed')
            except Exception as e:
                print(f'Test failed: {e}')
                sys.exit(1)
            EOF
          fi

  deploy-infrastructure:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      instance_ip: ${{ steps.get-outputs.outputs.instance_ip }}
      unique_suffix: ${{ steps.get-outputs.outputs.unique_suffix }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Pulumi
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Complete stack cleanup and fresh start
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          echo "Performing complete stack cleanup..."

          cd infrastructure
          pip install -r requirements.txt
          pulumi login

          if pulumi stack ls | grep -q "${{ env.PULUMI_STACK }}"; then
            echo "Stack exists, removing completely..."
            pulumi stack select ${{ env.PULUMI_STACK }} || true
            pulumi destroy --yes --skip-preview || true
            pulumi stack rm ${{ env.PULUMI_STACK }} --yes --force || true
            echo "Stack removed"
          else
            echo "No existing stack found"
          fi

          echo "Creating fresh stack..."
          pulumi stack init ${{ env.PULUMI_STACK }}
          echo "Fresh stack created successfully"

      - name: Deploy infrastructure
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          cd infrastructure
          pulumi stack select ${{ env.PULUMI_STACK }}
          pulumi up --yes

      - name: Get deployment outputs
        id: get-outputs
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
        run: |
          cd infrastructure
          echo "instance_ip=$(pulumi stack output instance_public_ip)" >> $GITHUB_OUTPUT
          echo "unique_suffix=$(pulumi stack output unique_suffix)" >> $GITHUB_OUTPUT

  build-and-push:
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [ml-inference, data-ingestion]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build, tag, and push image to Docker Hub
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd services/${{ matrix.service }}

          if [ "${{ matrix.service }}" = "ml-inference" ]; then
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/ml-inference"
          else
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/data-ingestion"
          fi

          echo "Building image: $IMAGE_NAME:$IMAGE_TAG"
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker tag $IMAGE_NAME:$IMAGE_TAG $IMAGE_NAME:latest

          echo "Pushing image tags..."
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  deploy-services:
    needs: [deploy-infrastructure, build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Get instance details
        id: get-instance
        run: |
          echo "instance_ip=${{ needs.deploy-infrastructure.outputs.instance_ip }}" >> $GITHUB_OUTPUT
          echo "unique_suffix=${{ needs.deploy-infrastructure.outputs.unique_suffix }}" >> $GITHUB_OUTPUT

      - name: Wait for EC2 instance to be ready
        run: |
          echo "Waiting for EC2 instance to be fully ready..."
          INSTANCE_IP="${{ steps.get-instance.outputs.instance_ip }}"

          timeout=300
          while ! nc -z $INSTANCE_IP 22; do
            echo "Waiting for SSH on $INSTANCE_IP..."
            sleep 10
            timeout=$((timeout-10))
            if [ $timeout -le 0 ]; then
              echo "SSH timeout reached"
              break
            fi
          done

          echo "SSH is available on $INSTANCE_IP"
          sleep 60

      - name: Deploy services to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-instance.outputs.instance_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            set -e

            echo "=== Starting EC2 Service Deployment ==="

            echo "Waiting for EC2 initialization to complete..."
            timeout=1200
            while [ ! -f /home/ubuntu/setup-info.txt ] && [ $timeout -gt 0 ]; do
              echo "Waiting for setup completion... ($timeout seconds remaining)"
              sleep 20
              timeout=$((timeout-20))
            done

            if [ ! -f /home/ubuntu/setup-info.txt ]; then
              echo "Setup timeout - proceeding with manual setup..."

              if ! command -v docker &> /dev/null; then
                echo "Installing Docker manually..."
                curl -fsSL https://get.docker.com -o get-docker.sh
                sudo sh get-docker.sh
                sudo usermod -aG docker ubuntu
                sudo systemctl start docker
                sudo systemctl enable docker
              fi

              if ! command -v docker-compose &> /dev/null; then
                echo "Installing Docker Compose..."
                sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
                sudo chmod +x /usr/local/bin/docker-compose
              fi
            else
              echo "EC2 setup completed successfully!"
              cat /home/ubuntu/setup-info.txt
            fi

            echo "Starting Docker service..."
            sudo systemctl start docker
            sudo systemctl enable docker

            echo "Waiting for Docker to be ready..."
            timeout 300 bash -c 'while ! sudo docker info > /dev/null 2>&1; do echo "Waiting for Docker..."; sleep 5; done'

            if sudo docker info > /dev/null 2>&1; then
              echo "Docker is ready!"
            else
              echo "Docker failed to start"
              sudo systemctl status docker
              exit 1
            fi

            echo "Setting up monitoring directories..."
            mkdir -p /home/ubuntu/monitoring/prometheus
            mkdir -p /home/ubuntu/monitoring/grafana/provisioning/datasources
            mkdir -p /home/ubuntu/monitoring/grafana/provisioning/dashboards
            mkdir -p /home/ubuntu/monitoring/grafana/dashboards

            echo "Creating Prometheus config..."
            cat > /home/ubuntu/monitoring/prometheus/prometheus.yml << 'PROMETHEUS_EOF'
            global:
              scrape_interval: 15s
              evaluation_interval: 15s

            scrape_configs:
              - job_name: 'prometheus'
                static_configs:
                  - targets: ['localhost:9090']

              - job_name: 'ml-inference'
                static_configs:
                  - targets: ['ml-inference:8001']
                metrics_path: '/metrics'
                scrape_interval: 10s

              - job_name: 'data-ingestion'
                static_configs:
                  - targets: ['data-ingestion:8002']
                metrics_path: '/metrics'
                scrape_interval: 10s
            PROMETHEUS_EOF

            echo "Creating Grafana datasource config..."
            cat > /home/ubuntu/monitoring/grafana/provisioning/datasources/prometheus.yml << 'DATASOURCE_EOF'
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                access: proxy
                url: http://prometheus:9090
                isDefault: true
                editable: false
            DATASOURCE_EOF

            echo "Creating Grafana dashboard provisioning config..."
            cat > /home/ubuntu/monitoring/grafana/provisioning/dashboards/dashboard.yml << 'DASHBOARD_EOF'
            apiVersion: 1
            providers:
              - name: 'MLOps Dashboards'
                orgId: 1
                folder: ''
                type: file
                disableDeletion: false
                updateIntervalSeconds: 10
                allowUiUpdates: true
                options:
                  path: /var/lib/grafana/dashboards
                  foldersFromFilesStructure: true
            DASHBOARD_EOF

            echo "Creating docker-compose.yml..."
            cat > /home/ubuntu/docker-compose.yml << 'COMPOSE_EOF'
            version: '3.8'
            services:
              ml-inference:
                image: faizul56/ml-inference:latest
                ports:
                  - "8001:8001"
                restart: always
                networks:
                  - mlops-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 90s

              data-ingestion:
                image: faizul56/data-ingestion:latest
                ports:
                  - "8002:8002"
                restart: always
                networks:
                  - mlops-network
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 90s

              prometheus:
                image: prom/prometheus:latest
                ports:
                  - "9090:9090"
                volumes:
                  - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
                  - prometheus-data:/prometheus
                command:
                  - '--config.file=/etc/prometheus/prometheus.yml'
                  - '--storage.tsdb.path=/prometheus'
                  - '--web.console.libraries=/etc/prometheus/console_libraries'
                  - '--web.console.templates=/etc/prometheus/consoles'
                  - '--storage.tsdb.retention.time=200h'
                  - '--web.enable-lifecycle'
                restart: always
                networks:
                  - mlops-network

              grafana:
                image: grafana/grafana:latest
                ports:
                  - "3000:3000"
                environment:
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                  - GF_USERS_ALLOW_SIGN_UP=false
                volumes:
                  - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
                  - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
                  - grafana-data:/var/lib/grafana
                depends_on:
                  - prometheus
                restart: always
                networks:
                  - mlops-network

            networks:
              mlops-network:
                driver: bridge

            volumes:
              prometheus-data:
              grafana-data:
            COMPOSE_EOF

            echo "Pulling latest Docker Hub images..."
            sudo docker pull faizul56/ml-inference:latest
            sudo docker pull faizul56/data-ingestion:latest
            sudo docker pull prom/prometheus:latest
            sudo docker pull grafana/grafana:latest

            echo "Deploying MLOps services..."
            cd /home/ubuntu
            sudo docker-compose down || true
            sudo docker-compose up -d

            echo "Waiting for services to become healthy..."
            sleep 30

            echo "Running container status check..."
            sudo docker ps -a

            echo "Checking service health endpoints..."
            curl -f http://localhost:8001/health || (echo "ML inference health check failed" && exit 1)
            curl -f http://localhost:8002/health || (echo "Data ingestion health check failed" && exit 1)
            curl -f http://localhost:9090/-/healthy || (echo "Prometheus health check failed" && exit 1)
            curl -f http://localhost:3000/api/health || (echo "Grafana health check failed" && exit 1)

            echo "Deployment completed successfully!"
            echo "ML Inference: http://$(curl -s ifconfig.me):8001/health"
            echo "Data Ingestion: http://$(curl -s ifconfig.me):8002/health"
            echo "Prometheus: http://$(curl -s ifconfig.me):9090"
            echo "Grafana: http://$(curl -s ifconfig.me):3000"